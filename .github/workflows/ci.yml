name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - run: bun install --frozen-lockfile

      - run: mise run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - run: bun install --frozen-lockfile

      - run: mise run test

  version-preview:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Determine next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/version-preview.sh

      - name: Job summary
        run: |
          if [ "${{ steps.version.outputs.will_release }}" = "true" ]; then
            echo "## 📦 Version Bump" >> "$GITHUB_STEP_SUMMARY"
            echo "This PR will release **v${{ steps.version.outputs.next_version }}**." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 📦 No Release" >> "$GITHUB_STEP_SUMMARY"
            echo "This PR will not trigger a new release." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WILL_RELEASE: ${{ steps.version.outputs.will_release }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/version-comment.sh
