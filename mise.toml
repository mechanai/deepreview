[tools]
bun = "1"
actionlint = "1.7.11"
shellcheck = "0.10.0"

[tasks.build]
description = "Build setup script for Node.js compatibility"
run = "bun build src/setup.ts --outfile dist/setup.mjs --target node --format esm --packages external --banner '#!/usr/bin/env node'"

[tasks.fmt]
description = "Format repo"
depends = ["fmt:*"]

[tasks."fmt:mise"]
description = "Format mise config"
run = "mise fmt"

[tasks."fmt:oxfmt"]
description = "Format files via oxfmt"
run = "bun x oxfmt --write ."

[tasks.lint]
description = "Lint repo"
depends = ["lint:*"]

[tasks."lint:actionlint"]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks."lint:oxlint"]
description = "Lint TypeScript files"
run = "bun x oxlint src .opencode"

[tasks."lint:oxfmt"]
description = "Check if files are formatted correctly"
run = "bun x oxfmt --check ."

[tasks."lint:shellcheck"]
description = "Lint shell files"
run = "shellcheck .github/scripts/*.sh"

[tasks.test]
description = "Run tests"
run = "bun test"
